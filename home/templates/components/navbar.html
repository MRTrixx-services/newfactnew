{% load static %}

<nav class="custom-navbar">

    <!-- TOP BAR -->
    <div class="top-bar">

        <!-- LOGO + TITLE -->
        <a href="{% url 'home' %}" class="brand">
            <img src="{% static 'home/images/logo.png' %}" alt="logo">
            <div>
                <span class="brand-text">NEWFACT ENGINEERING</span>
                <span class="brand-sub">BIM & Engineering Solutions</span>
            </div>
        </a>

        <!-- MOBILE TOGGLER -->
        <button class="nav-toggler" id="nav-toggler" aria-expanded="false" aria-label="Open navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- MENU -->
        <!-- MENU -->
<div class="menu">
    <a href="{% url 'home' %}"
       class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
       HOME
    </a>
    <a href="{% url 'services' %}"
       class="{% if request.resolver_match.url_name == 'services' %}active{% endif %}">
       SERVICES
    </a>
    <a href="{% url 'projects' %}"
       class="{% if request.resolver_match.url_name == 'projects' %}active{% endif %}">
       PROJECTS
    </a>
    <a href="{% url 'social_services' %}"
       class="{% if request.resolver_match.url_name == 'social_services' %}active{% endif %}">
       SOCIAL SERVICE
    </a>
    <a href="{% url 'careers' %}"
       class="{% if request.resolver_match.url_name == 'careers' %}active{% endif %}">
       CAREERS
    </a>
    <a href="{% url 'contact' %}"
       class="{% if request.resolver_match.url_name == 'contact' %}active{% endif %}">
       CONTACTS
    </a>
</div>


    <!-- SUB BAR -->
    

</nav>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggler = document.getElementById('nav-toggler');
        const navbar = document.querySelector('.custom-navbar');
        if (!toggler || !navbar) return;

        toggler.addEventListener('click', function() {
            const isOpen = navbar.classList.toggle('nav-open');
            const togglerOpen = toggler.classList.toggle('open');
            toggler.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            toggler.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
        });
    });
</script>
